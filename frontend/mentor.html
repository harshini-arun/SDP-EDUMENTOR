<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mentor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar custom-navbar px-4">
    <span class="navbar-brand text-white fw-semibold">Mentor Dashboard</span>
</nav>

<div class="container mt-4">

    <!-- ADD MENTEE CARD -->
    <div class="card clean-card mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Add Mentee</h5>

            <div class="row g-2">
                <div class="col-md-6"><input class="form-control clean-input" placeholder="Name"></div>
                <div class="col-md-6"><input class="form-control clean-input" placeholder="Register Number"></div>

                <div class="col-md-6"><input class="form-control clean-input" placeholder="Department"></div>
                <div class="col-md-6"><input class="form-control clean-input" placeholder="Year"></div>

                <div class="col-md-6"><input class="form-control clean-input" placeholder="Email"></div>
                <div class="col-md-6"><input class="form-control clean-input" placeholder="Phone"></div>

                <div class="col-md-6"><input class="form-control clean-input" placeholder="CGPA"></div>
                <div class="col-md-6"><input class="form-control clean-input" placeholder="Attendance"></div>

                <div class="col-12"><textarea class="form-control clean-input" placeholder="Remarks"></textarea></div>
                <div class="col-12"><textarea class="form-control clean-input" placeholder="Confidential Notes"></textarea></div>
            </div>

            <button class="btn btn-primary clean-btn mt-3">Add Mentee</button>
        </div>
    </div>

    <!-- SEARCH + TABLE -->
    <div class="card clean-card">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Mentees</h5>
                <input id="search" class="form-control clean-input w-25" placeholder="Search">
            </div>

            <table class="table clean-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Reg No</th>
                        <th>CGPA</th>
                        <th>Attendance</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <tr>
                        <td>Harshini</td>
                        <td>22IT001</td>
                        <td>9.1</td>
                        <td>92%</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary">Edit</button>
                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
